<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>MemeDrop Overlay</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', Roboto, sans-serif;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
  }

  #stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: translateY(18px) scale(0.96);
    transition: opacity 300ms ease, transform 320ms cubic-bezier(.2,.9,.3,1.2);
  }
  #stage.show { opacity: 1; transform: translateY(0) scale(1); }
  #stage.hide { opacity: 0; transform: translateY(-18px) scale(0.96); }

  #media-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    padding: 14px;
    box-sizing: border-box;
    gap: 8px;
  }

  #media-inner {
    position: relative;
    width: 100%;
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  #media-inner img,
  #media-inner video {
    max-width: 100%;
    max-height: 100%;
    display: block;
    border-radius: 10px;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.55));
  }

  #author {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 4px;
  }
  #author.hidden { display: none; }
  #author img {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 3px solid #43d68f;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.6), 0 4px 10px rgba(0,0,0,0.5);
    object-fit: cover;
    background: #2a2c3c;
  }
  #author .author-name {
    font-weight: 800;
    font-size: 18px;
    color: #fff;
    -webkit-text-stroke: 3px #000;
    paint-order: stroke fill;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    word-break: break-word;
  }

  .tt-wrap {
    position: relative;
    height: 100%;
    max-height: 400px;
    aspect-ratio: 9 / 16;
    margin: 0 auto;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 12px 28px rgba(0,0,0,0.55);
    background: #000;
  }
  .tt-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  #progress {
    margin-top: 6px;
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  #progress-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #5865F2, #eb459e);
    transform-origin: left center;
  }
  #stage.text-only #progress { display: none; }

  #text {
    flex: 0 0 auto;
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    line-height: 1.15;
    color: #fff;
    -webkit-text-stroke: 4px #000;
    paint-order: stroke fill;
    text-shadow: 0 2px 6px rgba(0,0,0,0.7);
    word-break: break-word;
    overflow-wrap: anywhere;
    pointer-events: none;
    max-height: 120px;
    overflow: hidden;
    padding: 0 4px;
  }
  #text:empty { display: none; }

  /* Quand y a pas de media, on centre le texte au milieu */
  #stage.text-only #media-inner { display: none; }
  #stage.text-only #text {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    max-height: none;
    -webkit-text-stroke: 5px #000;
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="media-wrap">
      <div id="author" class="hidden">
        <img id="author-avatar" alt="" />
        <div class="author-name" id="author-name"></div>
      </div>
      <div id="media-inner"></div>
      <div id="text"></div>
    </div>
  </div>

<script>
  const stage = document.getElementById('stage');
  const mediaWrap = document.getElementById('media-wrap');
  const mediaInner = document.getElementById('media-inner');
  const textEl = document.getElementById('text');
  const authorEl = document.getElementById('author');
  const authorAvatarEl = document.getElementById('author-avatar');
  const authorNameEl = document.getElementById('author-name');

  const MAX_DURATION_MS = 60000; // 1 minute max

  let hideTimer = null;
  let gifLoopTimer = null;
  let queue = [];
  let playing = false;
  let currentMediaEl = null;
  let currentMediaKind = null; // 'image' | 'video' | 'audio' | 'tiktok'
  let currentVolume = 80;
  let currentMuted = false;

  function applyVolumeToMedia(volume, muted) {
    if (!currentMediaEl) return;
    try {
      if (currentMediaKind === 'video' || currentMediaKind === 'audio') {
        currentMediaEl.volume = volume / 100;
        currentMediaEl.muted = muted;
      }
    } catch (_) {}
  }

  function pauseCurrentMedia() {
    if (!currentMediaEl) return;
    try {
      if (typeof currentMediaEl.pause === 'function') currentMediaEl.pause();
    } catch (_) {}
  }

  function clearStage() {
    pauseCurrentMedia();
    if (gifLoopTimer) { clearInterval(gifLoopTimer); gifLoopTimer = null; }
    currentMediaEl = null;
    currentMediaKind = null;
    mediaInner.innerHTML = '';
    textEl.textContent = '';
    authorEl.classList.add('hidden');
    authorAvatarEl.removeAttribute('src');
    authorNameEl.textContent = '';
    stage.classList.remove('text-only', 'show', 'hide');
  }

  function renderAuthor(author) {
    if (!author || !author.name) {
      authorEl.classList.add('hidden');
      return;
    }
    authorNameEl.textContent = author.name;
    if (author.avatarUrl) {
      authorAvatarEl.src = author.avatarUrl;
    } else {
      authorAvatarEl.removeAttribute('src');
    }
    authorEl.classList.remove('hidden');
  }

  function scheduleHide(durationMs) {
    if (hideTimer) clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      stage.classList.remove('show');
      stage.classList.add('hide');
      setTimeout(() => {
        clearStage();
        playing = false;
        next();
      }, 340);
    }, durationMs);
  }

  function showStage() {
    requestAnimationFrame(() => {
      stage.classList.add('show');
    });
  }

  function capMs(ms) {
    return Math.min(MAX_DURATION_MS, Math.max(2000, ms));
  }

  function render({ mediaUrl, mediaKind, text, author, duration, forceDuration, volume, muted }) {
    clearStage();
    textEl.textContent = text || '';
    renderAuthor(author);

    const cfgMs = Math.max(2000, Number(duration) || 8000);
    const force = !!forceDuration;
    currentVolume = Math.max(0, Math.min(100, Number(volume ?? 80)));
    currentMuted = !!muted;
    const vol = currentVolume / 100;

    if (!mediaUrl) {
      stage.classList.add('text-only');
      showStage();
      scheduleHide(capMs(cfgMs));
      return;
    }

    if (mediaKind === 'image') {
      currentMediaKind = 'image';
      const img = new Image();
      img.onload = () => { showStage(); scheduleHide(capMs(cfgMs)); };
      img.onerror = () => { showStage(); scheduleHide(capMs(cfgMs)); };
      img.src = mediaUrl;
      mediaInner.appendChild(img);
      currentMediaEl = img;
      // Force la repetition des GIFs (certains GIFs ne loopent pas tout seuls
      // car le CDN cache et le browser sert depuis le cache). On fetch le GIF
      // en Blob une fois, puis on swap des ObjectURL frais pour forcer un
      // re-decodage et donc une nouvelle execution de l'animation.
      if (/\.gif(\?|#|$)/i.test(mediaUrl)) {
        let activeObjectUrl = null;
        fetch(mediaUrl, { cache: 'force-cache' })
          .then((r) => r.ok ? r.blob() : null)
          .then((blob) => {
            if (!blob || !img.parentNode) return;
            activeObjectUrl = URL.createObjectURL(blob);
            img.src = activeObjectUrl;
            gifLoopTimer = setInterval(() => {
              if (!img.parentNode) {
                clearInterval(gifLoopTimer);
                gifLoopTimer = null;
                if (activeObjectUrl) URL.revokeObjectURL(activeObjectUrl);
                return;
              }
              const old = activeObjectUrl;
              activeObjectUrl = URL.createObjectURL(blob);
              img.src = activeObjectUrl;
              if (old) URL.revokeObjectURL(old);
            }, 3500);
          })
          .catch(() => { /* fallback: GIF restera fige, tant pis */ });
      }
      return;
    }

    if (mediaKind === 'video') {
      currentMediaKind = 'video';
      const v = document.createElement('video');
      v.src = mediaUrl;
      v.autoplay = true;
      v.muted = currentMuted;
      v.volume = vol;
      v.playsInline = true;
      v.controls = false;
      v.onloadedmetadata = () => {
        const mediaMs = (v.duration && isFinite(v.duration)) ? v.duration * 1000 : cfgMs;
        showStage();
        scheduleHide(capMs(force ? cfgMs : Math.max(mediaMs, cfgMs)));
      };
      v.onerror = () => { showStage(); scheduleHide(capMs(cfgMs)); };
      mediaInner.appendChild(v);
      currentMediaEl = v;
      v.play().catch(() => {});
      return;
    }

    if (mediaKind === 'audio') {
      currentMediaKind = 'audio';
      stage.classList.add('text-only');
      const a = new Audio(mediaUrl);
      a.autoplay = true;
      a.muted = currentMuted;
      a.volume = vol;
      a.onloadedmetadata = () => {
        const mediaMs = (a.duration && isFinite(a.duration)) ? a.duration * 1000 : cfgMs;
        showStage();
        scheduleHide(capMs(force ? cfgMs : Math.max(mediaMs, cfgMs)));
      };
      a.onerror = () => { showStage(); scheduleHide(capMs(cfgMs)); };
      a.play().catch(() => {});
      currentMediaEl = a;
      return;
    }

    if (mediaKind === 'tiktok') {
      currentMediaKind = 'tiktok';
      const wrap = document.createElement('div');
      wrap.className = 'tt-wrap';
      const iframe = document.createElement('iframe');
      iframe.src = 'https://www.tiktok.com/player/v1/' + encodeURIComponent(mediaUrl) + '?music_info=1&description=0&autoplay=1';
      iframe.setAttribute('allow', 'autoplay; encrypted-media; fullscreen; picture-in-picture');
      iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
      iframe.setAttribute('allowfullscreen', '');
      iframe.onload = () => { showStage(); scheduleHide(capMs(cfgMs)); };
      iframe.onerror = () => {
        console.error('[overlay] TikTok iframe error', mediaUrl);
        showStage();
        scheduleHide(capMs(cfgMs));
      };
      wrap.appendChild(iframe);
      mediaInner.appendChild(wrap);
      currentMediaEl = iframe;
      // Safety net : si l'iframe ne fire jamais onload (rare), debloque la queue
      setTimeout(() => {
        if (!stage.classList.contains('show')) { showStage(); scheduleHide(capMs(cfgMs)); }
      }, 4000);
      return;
    }

    // Fallback : type inconnu, juste texte
    stage.classList.add('text-only');
    showStage();
    scheduleHide(capMs(cfgMs));
  }

  function next() {
    if (playing) return;
    const item = queue.shift();
    if (!item) return;
    playing = true;
    render(item);
  }

  window.memedrop.onAudioChange(({ volume, muted }) => {
    currentVolume = Math.max(0, Math.min(100, Number(volume) || 0));
    currentMuted = !!muted;
    applyVolumeToMedia(currentVolume, currentMuted);
  });

  window.memedrop.onMeme((data) => {
    queue.push(data);
    next();
  });
</script>
</body>
</html>
